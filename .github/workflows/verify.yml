name: Verify Promise Ledger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Verify policy and repository contracts
        run: npm test

      - name: Verify CockroachDB schema contract
        run: npm run db:verify-schema
